<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下次跳抱倒數</title>
  <style>
    :root{
      --gold:#f6c65b;
      --gold2:#ffe7a3;
      --glass:rgba(20,18,12,.62);
      --border:rgba(246,198,91,.72);
      --white:#fff7df;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
      color:var(--white);
      background:
        linear-gradient(rgba(5,6,10,.28), rgba(5,6,10,.34)),
        url("background.png") center top / cover no-repeat fixed;
      overflow-x:hidden;
    }
    .page{
      min-height:100vh;
      padding:28px 20px 56px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .topbar{
      width:min(920px,100%);
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:56px;
    }
    .pill{
      border:1px solid var(--border);
      background:rgba(12,13,18,.58);
      border-radius:16px;
      padding:12px 18px;
      color:var(--white);
      box-shadow:0 0 18px rgba(246,198,91,.22);
      backdrop-filter:blur(12px);
      font-weight:600;
      letter-spacing:.02em;
    }
    .hero{
      text-align:center;
      width:min(940px,100%);
      margin-top:8px;
    }
    .heart{
      font-size:60px;
      color:var(--gold2);
      text-shadow:0 0 18px var(--gold),0 0 36px rgba(246,198,91,.7);
      animation:pulse 1.8s infinite;
    }
    h1{
      margin:8px 0 12px;
      font-size:clamp(48px,9vw,92px);
      letter-spacing:.08em;
      color:var(--gold2);
      text-shadow:0 0 16px var(--gold),0 0 42px rgba(246,198,91,.62);
      font-weight:800;
    }
    .subtitle{
      font-size:clamp(20px,3.2vw,32px);
      margin:0 0 12px;
      text-shadow:0 2px 18px rgba(0,0,0,.7);
    }
    .script{
      color:var(--gold);
      font-family:"Brush Script MT","Segoe Script",cursive;
      font-size:clamp(31px,5vw,54px);
      margin:0 0 38px;
      text-shadow:0 0 18px rgba(246,198,91,.6);
    }
    .count-card,.quote-card{
      width:min(900px,100%);
      border:1px solid var(--border);
      background:var(--glass);
      border-radius:28px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 22px 80px rgba(0,0,0,.42),
        0 0 40px rgba(246,198,91,.18);
      backdrop-filter:blur(14px);
    }
    .count-card{
      padding:42px 26px 40px;
      position:relative;
    }
    .count-title{
      color:var(--white);
      font-size:clamp(19px,3vw,28px);
      margin-bottom:34px;
      font-weight:700;
    }
    .timer{
      display:grid;
      grid-template-columns:1fr auto 1fr auto 1fr auto 1fr;
      align-items:center;
      gap:10px;
    }
    .num{
      font-size:clamp(54px,12vw,96px);
      color:var(--gold);
      font-weight:800;
      line-height:1;
      text-shadow:0 0 18px rgba(246,198,91,.45);
    }
    .colon{
      font-size:clamp(36px,8vw,70px);
      opacity:.85;
      color:#fff8df;
      transform:translateY(-18px);
    }
    .label-zh{
      margin-top:20px;
      font-size:clamp(20px,3vw,30px);
    }
    .label-en{
      margin-top:8px;
      font-size:15px;
      letter-spacing:.06em;
      opacity:.92;
    }
    .spark{
      position:absolute;
      color:var(--gold2);
      font-size:24px;
      text-shadow:0 0 16px var(--gold);
    }
    .s1{left:24px;top:28px}
    .s2{right:24px;top:28px}
    .s3{left:24px;bottom:28px}
    .s4{right:24px;bottom:28px}
    .quote-mark{
      color:var(--gold);
      font-size:86px;
      line-height:.3;
      margin-top:34px;
      text-shadow:0 0 22px rgba(246,198,91,.55);
    }
    .quote-card{
      width:min(660px,100%);
      margin-top:0;
      padding:40px 28px 36px;
      text-align:center;
      font-size:clamp(23px,3.4vw,32px);
      line-height:1.8;
      position:relative;
    }
    .like{
      margin-top:18px;
      color:var(--gold);
      font-family:"Brush Script MT","Segoe Script",cursive;
      font-size:clamp(34px,5vw,54px);
      text-shadow:0 0 18px rgba(246,198,91,.5);
    }
    @keyframes pulse{
      0%,100%{transform:scale(1)}
      45%{transform:scale(1.09)}
    }
    @media(max-width:640px){
      body{background-attachment:scroll}
      .page{padding:20px 14px 38px}
      .topbar{margin-bottom:46px}
      .pill{font-size:14px;padding:10px 12px;border-radius:14px}
      .count-card{padding:32px 14px 34px;border-radius:24px}
      .timer{gap:4px}
      .colon{transform:translateY(-14px)}
      .label-en{font-size:11px}
      .quote-card{border-radius:24px}
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="pill">💛 <span id="todayText"></span></div>
      <button class="pill" onclick="toggleMusic()">♫ 播放音樂</button>
    </div>

    <section class="hero">
      <div class="heart">♡</div>
      <h1>下次跳抱倒數</h1>
      <p class="subtitle">每一天，都在想念妳的日子裡 💛</p>
      <p class="script">Can’t wait to see you again</p>

      <div class="count-card">
        <div class="spark s1">✦</div>
        <div class="spark s2">✦</div>
        <div class="spark s3">✦</div>
        <div class="spark s4">✦</div>

        <div class="count-title">📅 距離下次跳抱還有</div>

        <div class="timer">
          <div>
            <div id="days" class="num">--</div>
            <div class="label-zh">天</div>
            <div class="label-en">DAYS</div>
          </div>
          <div class="colon">:</div>
          <div>
            <div id="hours" class="num">--</div>
            <div class="label-zh">時</div>
            <div class="label-en">HOURS</div>
          </div>
          <div class="colon">:</div>
          <div>
            <div id="minutes" class="num">--</div>
            <div class="label-zh">分</div>
            <div class="label-en">MINUTES</div>
          </div>
          <div class="colon">:</div>
          <div>
            <div id="seconds" class="num">--</div>
            <div class="label-zh">秒</div>
            <div class="label-en">SECONDS</div>
          </div>
        </div>
      </div>

      <div class="quote-mark">“</div>

      <div class="quote-card">
        距離下次跳抱越來越近了，<br />
        每天都期待著那一天的到來。
        <div class="like">I like you. 〰♡</div>
      </div>
    </section>
  </main>

  <script>
    const targetTime = new Date("2026-07-24T13:00:00+08:00").getTime();

    function pad(n){ return String(n).padStart(2, "0"); }

    function updateToday(){
      const now = new Date();
      const weekdays = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
      document.getElementById("todayText").textContent =
        `${now.getFullYear()}年${pad(now.getMonth()+1)}月${pad(now.getDate())}日 ${weekdays[now.getDay()]}`;
    }

    function updateCountdown(){
      const diff = targetTime - Date.now();

      if(diff <= 0){
        document.querySelector(".hero").innerHTML = `
          <div class="heart">♡</div>
          <h1>終於跳抱了</h1>
          <p class="subtitle">這一刻，等到了 💛</p>
          <div class="quote-card">願今天比想像中更幸福。<div class="like">I like you. 〰♡</div></div>
        `;
        return;
      }

      const days = Math.floor(diff / 86400000);
      const hours = Math.floor(diff / 3600000) % 24;
      const minutes = Math.floor(diff / 60000) % 60;
      const seconds = Math.floor(diff / 1000) % 60;

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = pad(hours);
      document.getElementById("minutes").textContent = pad(minutes);
      document.getElementById("seconds").textContent = pad(seconds);
    }

    function toggleMusic(){
      alert("音樂功能已保留按鈕；若要加入音樂，之後放入 mp3 檔即可。");
    }

    updateToday();
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
